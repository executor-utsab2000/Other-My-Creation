<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean loader · drawing animation</title>
    <style>
        /* keep only the styles used by uncommented elements */
        .stacked-area-load-state--css-draw .chart-line {
            stroke-dasharray: 1066.1628910290706;
            stroke-dashoffset: 1066.1628910290706;
            animation: drawStroke 3s linear infinite forwards;
        }

        @keyframes drawStroke {
            0% { opacity: 0; }
            20% { opacity: 1; }
            80% { opacity: 0.8; }
            100% { stroke-dashoffset: 0; opacity: 0; }
        }

        /* remove .pulse and swipe classes — they are not used by any remaining element */
    </style>
</head>
<body>
    <!-- Only the drawing SVG remains. No background lines, no commented blocks. 
         Added width and height attributes for proper display -->
    <svg class="stacked-area-load-state--css-draw" 
         xmlns="http://www.w3.org/2000/svg" 
         viewBox="0 0 711 325"
         width="711"
         height="325">
        <!-- chart-bg removed (no horizontal lines) -->
        <polyline id="chart-line" class="chart-line--static" style="stroke:#ff758f;stroke-width:4;fill:none;"
            points="8.8,175.8 62.4,237.7 116.1,184.7 169.7,175.8 223.3,57 277,176.8 330.6,176.8 384.3,122.5 437.9,176.8 491.6,176.8 545.2,218.4 598.8,122.5 652.5,184.7 706.1,135.1 " />
        <polyline id="chart-line" class="chart-line" style="stroke:#e63946;stroke-width:4;fill:none;"
            points="8.8,175.8 62.4,237.7 116.1,184.7 169.7,175.8 223.3,57 277,176.8 330.6,176.8 384.3,122.5 437.9,176.8 491.6,176.8 545.2,218.4 598.8,122.5 652.5,184.7 706.1,135.1 " />
    </svg>
</body>
</html>
