<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Something 💖</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- 💋 INTRO PAGE -->
  <div class="introPage" id="introPage">

    <h1 class="introTitle">A small confession 🥹<br> For You 💋🥺</h1>

    <div class="envelopeCard">
      <img src="fp.gif" class="envelopeGif" alt="Cute Love GIF" />
      <p class="envelopeText">A tiny envelope ·🌹 full of love 💌</p>
    </div>

    <button id="startBtn" class="startBtn">
      Open with a Smile 💋🥹
    </button>

  </div>


  <!-- 💍 PROPOSAL SECTION -->
  <div class="proposalSection" id="proposalSection">

    <div class="mainContainer">

      <div class="graphicContainer">
        <div class="inner">

          <video src="boy1.webm" playsinline id="video"></video>

          <div class="heartDiv" id="heartDiv">
            <img src="heart1.gif" alt="" class="heartImage" />
          </div>

          <img src="girl.png" alt="" class="girlImg" />

        </div>
      </div>

      <!-- FINAL QUESTION -->
      <div class="final-question" id="finalQuestion">
        You make my heart smile 🫠<br />
        I promise I will change if needed 🫶<br />
        Will you be mine forever? 🥹💕<br>
        Can we together grow old ?💖🫠🥺🥹
      </div>

    </div>

  </div>

  <audio id="song" loop>
    <source src="song.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>

</body>

</html>
